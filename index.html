<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>AI To-Do Planner</title>

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>AI TO-DO PLANNER</h1>

    <button
      onclick="toggleTheme()"
      id="themeBtn"
    >
      🌙 Toggle Theme
    </button>

    <h2 id="motivation"></h2>

    <p class="subtitle">
      Organize smarter with AI-powered productivity ✨
    </p>

    <div id="aiSuggestion"></div>

    <input
      type="text"
      id="taskTitle"
      placeholder="Enter task"
    >

    <textarea
      id="taskDesc"
      placeholder="Task description"
    ></textarea>

    <input
      type="date"
      id="taskDate"
    >

    <button onclick="addTask()">
      Add AI Task
    </button>

    <input
      type="text"
      id="search"
      placeholder="Search tasks..."
      onkeyup="searchTasks()"
    >

    <div class="filters">

      <button onclick="filterTasks('all')">
        All
      </button>

      <button onclick="filterTasks('completed')">
        Completed
      </button>

      <button onclick="filterTasks('pending')">
        Pending
      </button>

    </div>

    <div class="timer">

      <h2 id="timer">
        25:00
      </h2>

      <button onclick="startTimer()">
        Start Focus
      </button>

    </div>

    <h2 id="streak">
      🔥 Productivity Streak: 0
    </h2>

    <div class="stats">

      <div class="stat-card">

        <h3 id="totalTasks">0</h3>

        <p>Total Tasks</p>

      </div>

      <div class="stat-card">

        <h3 id="completedTasks">0</h3>

        <p>Completed</p>

      </div>

    </div>

    <div id="taskList"></div>

    <div class="chatbot">

      <h2>
        🤖 AI Productivity Assistant
      </h2>

      <div id="chatMessages"></div>

      <input
        type="text"
        id="chatInput"
        placeholder="Ask AI something..."
      >

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script src="script.js"></script>

</body>

</html>
